name: Run 100-Agent Marketing Firm

on:
  workflow_dispatch: # Allows you to trigger the 100 agents manually with a single click

permissions:
  contents: write # Allows the workflow to commit and push the generated blueprint

jobs:
  execute-firm:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Network Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Create keys.txt from secret
      env:
        KEYS_SECRET: ${{ secrets.TOKEN_ROUTER_KEYS }}
      run: |
        echo "$KEYS_SECRET" > keys.txt

    - name: Execute Parallel Multi-Agent Swarm
      run: python run_agents.py

    - name: Commit and Push Flawless Marketing Blueprint
      run: |
        git config --global user.name "Autonomous Swarm Agent"
        git config --global user.email "agent-swarm@github.com"
        git add complete_marketing_blueprint.md
        git commit -m "docs: generate flawless 100-agent master marketing blueprint [skip ci]" || echo "No changes to commit"
        git push

